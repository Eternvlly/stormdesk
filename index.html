<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORMDESK — Polymarket Weather Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e12; --panel:#0f151b; --panel2:#121a22; --line:#1d2a35;
  --ink:#c8d6dd; --dim:#5d7280; --faint:#31424e;
  --up:#3ddc84; --down:#ff5d5d; --amber:#ffb347; --cyan:#4fd8eb;
  --mono:'IBM Plex Mono',monospace; --disp:'Chakra Petch',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg)}
body{
  font-family:var(--mono);color:var(--ink);min-height:100vh;
  background:
    radial-gradient(1200px 500px at 80% -10%, rgba(79,216,235,.06), transparent 60%),
    radial-gradient(900px 400px at 10% 110%, rgba(255,179,71,.05), transparent 60%),
    var(--bg);
  padding:22px 26px 60px;
}
body::after{ /* scanline texture */
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.35;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.14) 2px 3px);
}
a{color:var(--cyan)}

/* ---------- header ---------- */
header{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;
  border-bottom:1px solid var(--line);padding-bottom:14px}
.logo{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:.14em;
  color:#eaf4f8;text-transform:uppercase}
.logo em{font-style:normal;color:var(--cyan)}
.badge{font-size:11px;letter-spacing:.18em;padding:3px 10px;border:1px solid var(--line);
  color:var(--amber);text-transform:uppercase}
.badge.live{color:var(--down);border-color:var(--down);animation:blink 1.6s steps(2) infinite}
@keyframes blink{50%{opacity:.35}}
#meta{margin-left:auto;font-size:11px;color:var(--dim);text-align:right;line-height:1.7}
#stale{display:none;color:var(--down)}

/* ---------- stat strip ---------- */
.strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:1px;background:var(--line);border:1px solid var(--line);margin-top:20px}
.stat{background:var(--panel);padding:14px 16px 12px;position:relative;overflow:hidden}
.stat .k{font-size:10px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase}
.stat .v{font-family:var(--disp);font-size:26px;font-weight:500;margin-top:4px;color:#eaf4f8}
.stat .v.up{color:var(--up)}.stat .v.down{color:var(--down)}
.stat .s{font-size:10px;color:var(--faint);margin-top:2px}

/* ---------- layout ---------- */
.grid{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);gap:22px;margin-top:22px}
@media(max-width:980px){.grid{grid-template-columns:1fr}}
section{border:1px solid var(--line);background:var(--panel)}
h2{font-family:var(--disp);font-size:12px;font-weight:700;letter-spacing:.24em;
  text-transform:uppercase;color:var(--dim);padding:10px 14px;
  border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
h2 .n{color:var(--faint)}

/* equity curve */
#curve{display:block;width:100%;height:180px}

/* feed */
#feed{max-height:560px;overflow-y:auto}
.evt{display:grid;grid-template-columns:86px 52px 1fr auto;gap:10px;
  padding:9px 14px;border-bottom:1px solid #131c24;font-size:12px;align-items:baseline;
  animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1}}
.evt time{color:var(--faint);font-size:10px}
.evt .side{font-weight:600}
.side.BUY{color:var(--up)}.side.SELL{color:var(--amber)}
.evt .what{color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.evt .amt{color:var(--dim)}
.tag{font-size:9px;letter-spacing:.08em;padding:1px 6px;border:1px solid var(--faint);
  color:var(--dim);margin-left:6px;text-transform:uppercase}
.tag.news{color:var(--cyan);border-color:#1d4a54}
.tag.copy{color:var(--amber);border-color:#4a3a1d}
.reason{grid-column:2/-1;font-size:10px;color:var(--faint);font-style:italic}

/* tables */
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);
  text-align:left;padding:8px 14px;border-bottom:1px solid var(--line)}
td{padding:7px 14px;border-bottom:1px solid #131c24}
td.r,th.r{text-align:right}
.pos-title{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.up{color:var(--up)}.down{color:var(--down)}

/* signals + strategy */
.duo{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
.sig{background:var(--panel2);padding:12px 14px}
.sig h3{font-family:var(--disp);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
.sig h3.news{color:var(--cyan)}.sig h3.copy{color:var(--amber)}
.sig .row{display:flex;justify-content:space-between;font-size:11px;margin-top:6px;color:var(--dim)}
.sig .row b{color:var(--ink);font-weight:400}
#strat{padding:12px 14px;font-size:11px;line-height:1.9;color:var(--dim)}
#strat b{color:var(--ink);font-weight:400}
#strat .ver{font-family:var(--disp);color:var(--cyan);font-size:14px;letter-spacing:.1em}
.hist{font-size:10px;color:var(--faint);border-top:1px dashed var(--line);
  margin-top:8px;padding-top:8px}
#headlines{padding:10px 14px;font-size:11px;color:var(--dim);line-height:1.8;
  max-height:180px;overflow-y:auto}
#headlines li{list-style:none;border-bottom:1px dotted #16212b;padding:3px 0}
.empty{padding:26px 14px;text-align:center;color:var(--faint);font-size:11px;
  letter-spacing:.12em;text-transform:uppercase}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:var(--line)}
</style>
</head>
<body>

<header>
  <div class="logo">STORM<em>DESK</em></div>
  <span class="badge" id="mode">PAPER</span>
  <span class="badge">weather markets</span>
  <div id="meta">
    <div>updated <span id="upd">—</span> · refresh in <span id="cd">60</span>s</div>
    <div id="stale">⚠ DATA STALE — exporter may be down</div>
  </div>
</header>

<div class="strip" id="strip"></div>

<div class="grid">
  <div>
    <section>
      <h2>Equity curve <span class="n" id="curve-n"></span></h2>
      <svg id="curve" preserveAspectRatio="none"></svg>
    </section>
    <section style="margin-top:22px">
      <h2>Action feed <span class="n" id="feed-n"></span></h2>
      <div id="feed"></div>
    </section>
  </div>
  <div>
    <section>
      <h2>Signals</h2>
      <div class="duo" id="signals"></div>
    </section>
    <section style="margin-top:22px">
      <h2>Strategy</h2>
      <div id="strat"></div>
    </section>
    <section style="margin-top:22px">
      <h2>Open positions <span class="n" id="pos-n"></span></h2>
      <div style="overflow-x:auto"><table id="pos"></table></div>
    </section>
    <section style="margin-top:22px">
      <h2>Headline context <span class="n">(not traded)</span></h2>
      <ul id="headlines"></ul>
    </section>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const fmt=(n,d=2)=>n==null?"—":Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const usd=n=>n==null?"—":(n<0?"-$":"$")+fmt(Math.abs(n));
const pct=n=>n==null?"—":(n*100).toFixed(1)+"%";
const ts=t=>new Date(t*1000).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const cls=v=>v>0?"up":v<0?"down":"";

async function load(){
  let d;
  try{
    const r=await fetch("data.json?t="+Date.now());
    d=await r.json();
  }catch(e){ $("stale").style.display="block"; return; }
  render(d);
}

function render(d){
  const gen=new Date(d.generated_at);
  $("upd").textContent=gen.toLocaleTimeString();
  $("stale").style.display=(Date.now()-gen.getTime()>30*60*1000)?"block":"none";
  const m=$("mode");
  m.textContent=d.mode.toUpperCase();
  m.classList.toggle("live",d.mode==="live");

  // ---- stat strip ----
  const p=d.portfolio;
  const allSettled=(d.stats.news.settled||0)+(d.stats.copy.settled||0);
  const allWins=(d.stats.news.wins||0)+(d.stats.copy.wins||0);
  $("strip").innerHTML=[
    ["Total value",usd(p.total),`started ${usd(p.starting)}`,""],
    ["P&L",usd(p.pnl),fmt(p.pnl/p.starting*100,1)+"% return",cls(p.pnl)],
    ["Cash",usd(p.cash),"available",""],
    ["In positions",usd(p.positions_value),p.positions.length+" open",""],
    ["Win rate",allSettled?pct(allWins/allSettled):"—",allSettled+" settled",""],
    ["Strategy","v"+(d.strategy.version??"?"),"edge ≥ "+(d.strategy.news?.edge_threshold??"?"),""],
  ].map(([k,v,s,c])=>`<div class="stat"><div class="k">${k}</div><div class="v ${c}">${v}</div><div class="s">${s}</div></div>`).join("");

  drawCurve(d);

  // ---- action feed: fills + journal reasoning ----
  const reasons={};
  d.journal.forEach(j=>{
    const r=j.reasoning||{};
    reasons[j.token]=j.signal==="news"
      ?`model ${pct(r.model_p)} vs mkt ${pct(r.market_p)} · edge +${fmt(r.edge,2)} · ${r.city} ${r.forecast_tmax}°${r.unit} · lead ${r.lead_days}d`
      :`copying ${r.trader}`;
  });
  const feed=[...d.fills].reverse().map(f=>{
    const isNews=(f.copied_from||"").startsWith("news");
    return `<div class="evt">
      <time>${ts(f.ts)}</time>
      <span class="side ${f.side}">${f.side}</span>
      <span class="what">${esc(f.title)} <b style="color:var(--dim)">[${esc(f.outcome)}]</b>
        <span class="tag ${isNews?"news":"copy"}">${isNews?"news":"copy"}</span></span>
      <span class="amt">${usd(f.usd)} @ ${fmt(f.price,2)}</span>
      ${reasons[f.token]?`<span class="reason">└ ${esc(reasons[f.token])}</span>`:""}
    </div>`;
  }).join("");
  $("feed").innerHTML=feed||`<div class="empty">no actions yet — watching markets</div>`;
  $("feed-n").textContent=d.fills.length?`last ${d.fills.length}`:"";

  // ---- signals ----
  $("signals").innerHTML=["news","copy"].map(s=>{
    const x=d.stats[s];
    return `<div class="sig"><h3 class="${s}">${s==="news"?"◈ news / forecast":"⧉ copy trade"}</h3>
      <div class="row"><span>settled</span><b>${x.settled}</b></div>
      <div class="row"><span>open</span><b>${x.open}</b></div>
      <div class="row"><span>win rate</span><b>${pct(x.win_rate)}</b></div>
      <div class="row"><span>realized P&L</span><b class="${cls(x.pnl)}">${usd(x.pnl)}</b></div>
    </div>`;
  }).join("");

  // ---- strategy panel ----
  const n=d.strategy.news||{};
  $("strat").innerHTML=`<span class="ver">v${d.strategy.version}</span> · ${esc(d.strategy.notes||"")}
    <br>edge threshold <b>${n.edge_threshold}</b> · size <b>${usd(n.fixed_trade_usd)}</b>
    · max lead <b>${n.max_lead_days}d</b> · price band <b>${n.min_price}–${n.max_price}</b>
    ${d.strategy_history?.length?`<div class="hist">${d.strategy_history.map(h=>`v${h.version}: ${esc(h.reason)}`).join("<br>")}</div>`:""}`;

  // ---- positions ----
  const posEl=$("pos");
  const rows=p.positions.map(x=>`<tr>
    <td class="pos-title" title="${esc(x.title)}">${esc(x.title)} <b style="color:var(--faint)">[${esc(x.outcome)}]</b></td>
    <td class="r">${fmt(x.avg_price,2)}→${fmt(x.cur_price,2)}</td>
    <td class="r">${usd(x.value)}</td>
    <td class="r ${cls(x.pnl)}">${usd(x.pnl)}</td></tr>`).join("");
  posEl.innerHTML=rows
    ?`<tr><th>Market</th><th class="r">px</th><th class="r">value</th><th class="r">p&l</th></tr>`+rows
    :`<tr><td class="empty">no open positions</td></tr>`;
  $("pos-n").textContent=p.positions.length||"";

  // ---- headlines ----
  const h=(d.headlines[0]||{}).items||[];
  $("headlines").innerHTML=h.length?h.map(t=>`<li>${esc(t)}</li>`).join("")
    :`<li class="empty">no headlines journaled yet</li>`;
}

function drawCurve(d){
  const svg=$("curve"), W=800, H=180, pad=10;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  const start=d.portfolio.starting;
  let bal=start; const pts=[[0,start]];
  d.fills.forEach((f,i)=>{ bal+=(f.side==="SELL"?f.usd:-f.usd); pts.push([i+1,bal]); });
  pts.push([pts.length, d.portfolio.total]); // end at marked equity
  const ys=pts.map(p=>p[1]), min=Math.min(...ys), max=Math.max(...ys), span=(max-min)||1;
  const X=i=>pad+i/(pts.length-1)*(W-2*pad);
  const Y=v=>H-pad-((v-min)/span)*(H-2*pad);
  const line=pts.map((p,i)=>`${i?"L":"M"}${X(i).toFixed(1)},${Y(p[1]).toFixed(1)}`).join(" ");
  const up=d.portfolio.total>=start;
  const col=up?"#3ddc84":"#ff5d5d";
  svg.innerHTML=`
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity=".25"/>
      <stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <line x1="${pad}" x2="${W-pad}" y1="${Y(start)}" y2="${Y(start)}"
      stroke="#31424e" stroke-dasharray="3 5" stroke-width="1"/>
    <path d="${line} L${X(pts.length-1)},${H-pad} L${pad},${H-pad} Z" fill="url(#g)"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="1.6"/>
    <circle cx="${X(pts.length-1)}" cy="${Y(pts[pts.length-1][1])}" r="3" fill="${col}">
      <animate attributeName="opacity" values="1;.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>`;
  $("curve-n").textContent=`${d.fills.length} fills`;
}

let cd=60;
setInterval(()=>{ cd--; if(cd<=0){cd=60; load();} $("cd").textContent=cd; },1000);
load();
</script>
</body>
</html>
